name: Deploy Portfolio

on:
  push:
    branches: [main]

# Permissões necessárias para o deploy nativo
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: 'npm'

      - run: npm install
      - run: npm run build

      # Configura o Pages para o deploy nativo
      - name: Setup Pages
        uses: actions/configure-pages@v4

      # Sobe os arquivos da pasta 'build' como um artefato
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './build'

      # Faz o deploy do artefato diretamente
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4